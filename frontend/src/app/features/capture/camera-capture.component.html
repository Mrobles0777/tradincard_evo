<div class="camera-container">
  
  <div class="viewport">
    <!-- Camera Mode Viewport -->
    <div class="camera-stream" *ngIf="method() === 'camera'">
      <video #videoElement autoplay playsinline muted></video>
      <div class="overlay">
        <div class="card-guide" [class.analyzing]="isAnalyzing()">
          <div class="corner tl"></div><div class="corner tr"></div>
          <div class="corner bl"></div><div class="corner br"></div>
          <div class="scanning-line" *ngIf="isAnalyzing()"></div>
        </div>
      </div>
      
      <button class="mode-switch-btn floating-top" (click)="setMethod('upload')" *ngIf="!isAnalyzing()">
        📁
      </button>
    </div>

    <!-- Upload Mode Viewport -->
    <div class="upload-area" *ngIf="method() === 'upload'">
      <div class="upload-content" *ngIf="!previewUrl()">
        <div class="icon">📁</div>
        <h2>Cargar Carta</h2>
        <p>Selecciona una foto clara del frente de tu carta</p>
        <input type="file" id="fileInput" (change)="onFileSelected($event)" accept="image/*" class="file-input">
        <label for="fileInput" class="upload-btn">Seleccionar Archivo</label>
      </div>

      <div class="preview-content" *ngIf="previewUrl()">
        <div class="preview-wrapper">
          <img [src]="previewUrl()" alt="Vista previa" class="preview-img">
          <div class="scanning-line" *ngIf="isAnalyzing()"></div>
        </div>
        <button class="change-file" (click)="previewUrl.set(null); selectedBase64 = null" *ngIf="!isAnalyzing()">
          Cambiar Imagen
        </button>
      </div>
    </div>
  </div>

  <!-- Bottom Controls -->
  <div class="controls">
    <div class="type-selector" *ngIf="!isAnalyzing()">
      <button [class.active]="cardType() === 'pokemon'" (click)="setCardType('pokemon')">Pokémon</button>
      <button [class.active]="cardType() === 'yugioh'" (click)="setCardType('yugioh')">Yu-Gi-Oh!</button>
      <button [class.active]="cardType() === 'football'" (click)="setCardType('football')">Football</button>
    </div>

    <div class="actions">
      <!-- Only show switch here if in upload mode to keep it balanced -->
      <button class="mode-switch-btn" (click)="setMethod('camera')" *ngIf="method() === 'upload' && !isAnalyzing()">
        📷
      </button>

      <button class="capture-btn" (click)="capture()" [disabled]="isAnalyzing() || (method() === 'upload' && !selectedBase64)">
        <div *ngIf="!isAnalyzing()" class="btn-content">
          <span class="btn-icon">{{ method() === 'upload' ? '🔍' : '📸' }}</span>
          <span>{{ method() === 'upload' ? 'Analizar Carta' : 'Capturar y Analizar' }}</span>
        </div>
        <div *ngIf="isAnalyzing()" class="analysis-state">
          <span class="loader"></span>
          <span>{{ isProcessing() ? 'Recortando...' : 'Analizando...' }}</span>
        </div>
      </button>
    </div>
  </div>

  <div class="error-toast" *ngIf="error()">
    {{ error() }}
  </div>
</div>
